name: Run tests

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_call:
    secrets:
      staff:
        description: "string of comma delimited email addresses"
        required: true

permissions:
  contents: read

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install UV & Python
        id: setup-uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.7.17"
          python-version: "3.13.5"
      - name: Install project
        run: |
          make install_python_deps
          make install_npm_deps
          sudo apt-get install gettext

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.3"

      - name: Get npm cache directory
        id: npm-cache-dir
        run: make export_npm_cache_dir

      - name: Load cached npm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: $(cat .npm_cache_dir)
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build frontend assets
        run: make assets

      - name: Run unit tests with coverage
        id: fast-tests
        env:
          DJANGO_ALLOWED_HOSTS: "localhost testserver"
          STAFF: ${{ secrets.STAFF || 'test@test.com' }}
        run: TESTING=True uv run pytest --cov -m 'not slow and not datahub' --doctest-modules

      # - name: Run integration tests
      #   id: slow-tests
      #   if: steps.fast-tests.outcome == 'success'
      #   run: make integration

  javascript-only-tests:
    name: Javascript tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.3"

      - name: Get npm cache directory
        id: npm-cache-dir
        run: make export_npm_cache_dir

      - name: Load cached npm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: $(cat .npm_cache_dir)
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        id: install_dependencies
        run: npm install

      - name: Run javascript tests
        run: npm test
