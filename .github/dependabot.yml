# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    commit-message:
      include: "scope"
      prefix: ":dependabot: github-actions"
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "pip"
    commit-message:
      include: "scope"
      prefix: ":dependabot: pip"
    cooldown:
      default-days: 7
    directory: "/"
    groups: # see https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#groups
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - "faker"
          - "freezegun"
          - "pre-commit"
          - "pytest*"
          - "ruff"
          - "selenium"
      django-dependencies:
        applies-to: version-updates
        patterns:
          - "django*"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    commit-message:
      include: "scope"
      prefix: ":dependabot: npm"
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    commit-message:
      include: "scope"
      prefix: ":dependabot: docker"
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: "daily"
